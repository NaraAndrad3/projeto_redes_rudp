services:
  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: redes_server
    volumes:
      - ..:/app
    working_dir: /app
    command: tail -f /dev/null
    cap_add:
      - NET_ADMIN
      - NET_RAW

  client:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: redes_client
    volumes:
      - ..:/app
    working_dir: /app
    command: tail -f /dev/null
    cap_add:
      - NET_ADMIN
      - NET_RAW